<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .earth-land {
      animation: earth-land-drift 22s linear infinite;
      transform-box: view-box;
    }

    .earth-clouds {
      animation: earth-cloud-drift 34s linear infinite;
      transform-box: view-box;
    }

    @keyframes earth-land-drift {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-420px);
      }
    }

    @keyframes earth-cloud-drift {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-420px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .earth-land,
      .earth-clouds {
        animation: none;
      }
    }
  </style>

  <defs>
    <radialGradient id="ocean" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 130) rotate(48) scale(390)">
      <stop stop-color="#BFF8FF"/>
      <stop offset="0.38" stop-color="#34C7D7"/>
      <stop offset="0.72" stop-color="#107EAF"/>
      <stop offset="1" stop-color="#15476D"/>
    </radialGradient>
    <linearGradient id="land" x1="114" y1="118" x2="424" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6F5A7"/>
      <stop offset="0.45" stop-color="#6FD184"/>
      <stop offset="1" stop-color="#178A63"/>
    </linearGradient>
    <linearGradient id="landShade" x1="140" y1="150" x2="394" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDF2A0"/>
      <stop offset="1" stop-color="#1D9469"/>
    </linearGradient>
    <linearGradient id="ice" x1="168" y1="64" x2="350" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C7F3FF"/>
    </linearGradient>
    <linearGradient id="rim" x1="116" y1="84" x2="398" y2="426" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="0.54" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#032C55" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="shine" x1="144" y1="102" x2="318" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="globeClip">
      <circle cx="256" cy="256" r="198"/>
    </clipPath>
    <filter id="dropShadow" x="48" y="50" width="416" height="430" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" flood-color="#073A45" flood-opacity="0.2" stdDeviation="20"/>
    </filter>
  </defs>

  <ellipse cx="256" cy="438" rx="150" ry="28" fill="#D8EEF3" opacity="0.62"/>

  <g filter="url(#dropShadow)">
    <circle cx="256" cy="256" r="198" fill="url(#ocean)"/>

    <g clip-path="url(#globeClip)">
      <rect x="58" y="58" width="396" height="396" fill="url(#ocean)"/>


    </g>

    <circle cx="256" cy="256" r="198" stroke="url(#rim)" stroke-width="18"/>
    <circle cx="256" cy="256" r="204" stroke="#FFFFFF" stroke-opacity="0.62" stroke-width="5"/>
  </g>
</svg>
